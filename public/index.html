<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Post IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(45deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 30px;
    }

    .resultados {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 1000px) {
      .app {
        grid-template-columns: 1fr;
      }

      .resultados {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2, h3 {
      margin-top: 0;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.02);
      opacity: 0.95;
    }

    .preview {
      width: 100%;
      text-align: center;
    }

    canvas {
      width: 100%;
      height: auto;
      border-radius: 12px;
      display: block;
      background: rgba(255,255,255,0.04);
    }

    .loading {
      text-align: center;
      margin-top: 15px;
      opacity: 0.8;
    }

    .hidden-img {
      display: none;
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="panel">
      <h2>Generador de Contenido</h2>

      <input
        type="text"
        id="texto"
        placeholder="Título (ej: Volvé a escuchar lo que importa)"
      >

      <button onclick="generar()">Generar post + historia</button>

      <div class="loading" id="loading" style="display:none;">
        Generando imágenes...
      </div>
    </div>

    <div class="resultados">
      <div class="panel">
        <h3>Post 1:1</h3>
        <div class="preview">
          <canvas id="canvasPost"></canvas>
          <img id="imgPost" class="hidden-img">
        </div>
        <button onclick="descargar('canvasPost', 'post-cuadrado.png')">
          Descargar post
        </button>
      </div>

      <div class="panel">
        <h3>Historia 9:16</h3>
        <div class="preview">
          <canvas id="canvasStory"></canvas>
          <img id="imgStory" class="hidden-img">
        </div>
        <button onclick="descargar('canvasStory', 'story-vertical.png')">
          Descargar historia
        </button>
      </div>
    </div>
  </div>

  <script>
    let logoURL = "/logo.png";

    async function generar() {
      const texto = document.getElementById("texto").value.trim();
      const loading = document.getElementById("loading");

      if (!texto) {
        alert("Escribí un texto primero");
        return;
      }

      loading.style.display = "block";

      try {
        const res = await fetch("/api/generar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ texto })
        });

        const raw = await res.text();
        console.log("Respuesta cruda:", raw);

        let data;
        try {
          data = JSON.parse(raw);
        } catch (e) {
          throw new Error("La respuesta no es JSON válido");
        }

        if (!res.ok) {
          throw new Error(
            data?.error || data?.detalle || data?.message || "Error del servidor"
          );
        }

        if (!data.post?.b64_json || !data.story?.b64_json) {
          throw new Error("No llegaron las dos imágenes");
        }

        const imgPost = document.getElementById("imgPost");
        const imgStory = document.getElementById("imgStory");

        const postLoaded = cargarImagen(
          imgPost,
          "data:image/png;base64," + data.post.b64_json
        );

        const storyLoaded = cargarImagen(
          imgStory,
          "data:image/png;base64," + data.story.b64_json
        );

        await Promise.all([postLoaded, storyLoaded]);

        await dibujarPreview("imgPost", "canvasPost");
        await dibujarPreview("imgStory", "canvasStory");

        loading.style.display = "none";
      } catch (error) {
        console.error("Error:", error);
        loading.style.display = "none";
        alert("Error al generar las imágenes: " + error.message);
      }
    }

    function cargarImagen(imgElement, src) {
      return new Promise((resolve, reject) => {
        imgElement.onload = () => resolve();
        imgElement.onerror = reject;
        imgElement.src = src;
      });
    }

    function descargar(canvasId, nombreArchivo) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement("a");
      link.download = nombreArchivo;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

    async function dibujarPreview(imgId, canvasId) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext("2d");
      const img = document.getElementById(imgId);
      const textoUsuario = document.getElementById("texto").value || "";

      if (!img.src) return;

      const baseImage = new Image();
      baseImage.src = img.src;

      await new Promise((resolve, reject) => {
        baseImage.onload = resolve;
        baseImage.onerror = reject;
      });

      canvas.width = baseImage.width;
      canvas.height = baseImage.height;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(baseImage, 0, 0);

      const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
      grad.addColorStop(0, "rgba(0,120,135,0.8)");
      grad.addColorStop(0.25, "rgba(0,120,135,0)");
      grad.addColorStop(0.75, "rgba(0,120,135,0)");
      grad.addColorStop(1, "rgba(0,120,135,0.9)");
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.shadowColor = "rgba(0,0,0,0.6)";
      ctx.shadowBlur = 12;
      ctx.shadowOffsetY = 4;

      ctx.fillStyle = "white";
      ctx.textAlign = "center";
      ctx.textBaseline = "alphabetic";

      // Escala dinámica según tamaño del canvas
      const tituloSize = Math.max(42, Math.floor(canvas.width * 0.07));
      const subtituloSize = Math.max(20, Math.floor(canvas.width * 0.03));
      const telefonoSize = Math.max(28, Math.floor(canvas.width * 0.045));
      const logoHeight = Math.max(60, Math.floor(canvas.width * 0.12));

      ctx.font = `bold ${tituloSize}px Montserrat, sans-serif`;

      const palabras = textoUsuario.split(" ");
      if (palabras.length > 2) {
        const mitad = Math.ceil(palabras.length / 2);
        const linea1 = palabras.slice(0, mitad).join(" ");
        const linea2 = palabras.slice(mitad).join(" ");

        ctx.fillText(linea1, canvas.width * 0.5, canvas.height * 0.12);
        ctx.fillText(linea2, canvas.width * 0.5, canvas.height * 0.20);
      } else {
        ctx.fillText(textoUsuario, canvas.width * 0.5, canvas.height * 0.15);
      }

      const paddingX = canvas.width * 0.06;
      const baseY = canvas.height * 0.92;

      ctx.textAlign = "left";
      ctx.font = `${subtituloSize}px Montserrat, sans-serif`;
      ctx.fillText("Consultas sin cargo", paddingX, baseY - telefonoSize);

      ctx.font = `bold ${telefonoSize}px Montserrat, sans-serif`;
      ctx.fillText("3412-3456789", paddingX, baseY);

      if (logoURL) {
        const logoImg = new Image();
        logoImg.src = logoURL;

        await new Promise((resolve) => {
          logoImg.onload = () => {
            const h = logoHeight;
            const w = logoImg.width * (h / logoImg.height);
            const logoX = canvas.width - w - paddingX;
            const logoY = baseY - h + 10;
            ctx.drawImage(logoImg, logoX, logoY, w, h);
            resolve();
          };

          logoImg.onerror = () => resolve();
        });
      }

      ctx.shadowColor = "transparent";
    }

    document.getElementById("texto").addEventListener("input", async () => {
      const imgPost = document.getElementById("imgPost");
      const imgStory = document.getElementById("imgStory");

      if (imgPost.src) await dibujarPreview("imgPost", "canvasPost");
      if (imgStory.src) await dibujarPreview("imgStory", "canvasStory");
    });
  </script>
</body>
</html>
