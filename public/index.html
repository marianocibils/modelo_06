<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Generador de Post IA</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(45deg, #0f172a, #1e293b);
      color: white;
      min-height: 100vh;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 30px;
    }

    .resultados {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    @media (max-width: 1000px) {
      .app {
        grid-template-columns: 1fr;
      }

      .resultados {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    }

    h2, h3 {
      margin-top: 0;
      text-align: center;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      outline: none;
      background: rgba(255,255,255,0.1);
      color: white;
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 20px;
      border: none;
      border-radius: 10px;
      background: linear-gradient(135deg, #3b82f6, #6366f1);
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      transform: scale(1.02);
      opacity: 0.95;
    }

    .preview {
      width: 100%;
      text-align: center;
    }

    canvas {
      width: 100%;
      height: auto;
      border-radius: 12px;
      display: block;
      background: rgba(255,255,255,0.04);
    }

    .loading {
      text-align: center;
      margin-top: 15px;
      opacity: 0.8;
    }

    .hidden-img {
      display: none;
    }

    .logo-panel {
  width: 180px;
  max-width: 80%;
  display: block;
  margin: 0 auto 25px auto;
}
  </style>
</head>

<body>
  <div class="app">
<div class="panel">
  <img src="/logo.png" class="logo-panel" alt="Logo">

  <h2>Generador de Contenido</h2>

      <input
        type="text"
        id="texto"
        placeholder="Título (ej: Volvé a escuchar con claridad)"
      >
<label class="label-control">
  Tamaño del título: <span id="fontSizeValue">72</span> px
</label>

<input
  type="range"
  id="fontSizeControl"
  min="40"
  max="110"
  value="72"
>
      <button onclick="generar()">Generar</button>

      <div class="loading" id="loading" style="display:none;">
        Generando imágenes...
      </div>
    </div>

    <div class="resultados">
      <div class="panel">
        <h3>Post</h3>
        <div class="preview">
          <canvas id="canvasPost"></canvas>
          <img id="imgPost" class="hidden-img">
        </div>
        <button onclick="descargar('canvasPost', 'post-cuadrado.png')">
          Descargar post
        </button>
      </div>

      <div class="panel">
        <h3>Historia</h3>
        <div class="preview">
          <canvas id="canvasStory"></canvas>
          <img id="imgStory" class="hidden-img">
        </div>
        <button onclick="descargar('canvasStory', 'story-vertical.png')">
          Descargar historia
        </button>
      </div>
    </div>
  </div>

  <script>
    let logoURL = "/logo.png";

    async function generar() {
      const texto = document.getElementById("texto").value.trim();
      const loading = document.getElementById("loading");

      if (!texto) {
        alert("Escribí un texto primero");
        return;
      }

      loading.style.display = "block";

      try {
        const res = await fetch("/api/generar", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ texto })
        });

        const raw = await res.text();
        console.log("Respuesta cruda:", raw);

        let data;
        try {
          data = JSON.parse(raw);
        } catch (e) {
          throw new Error("La respuesta no es JSON válido");
        }

        if (!res.ok) {
          throw new Error(
            data?.error || data?.detalle || data?.message || "Error del servidor"
          );
        }

if (!data.post?.b64_json) {
  throw new Error("No llegó la imagen del post");
}

const imgPost = document.getElementById("imgPost");
const imgStory = document.getElementById("imgStory");

const imagenBase = "data:image/png;base64," + data.post.b64_json;

// Usamos LA MISMA imagen para post y story
await cargarImagen(imgPost, imagenBase);
await cargarImagen(imgStory, imagenBase);

await dibujarPost();
await dibujarStory();

        loading.style.display = "none";
      } catch (error) {
        console.error("Error:", error);
        loading.style.display = "none";
        alert("Error al generar las imágenes: " + error.message);
      }
    }

    function cargarImagen(imgElement, src) {
      return new Promise((resolve, reject) => {
        imgElement.onload = () => resolve();
        imgElement.onerror = reject;
        imgElement.src = src;
      });
    }

    function descargar(canvasId, nombreArchivo) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement("a");
      link.download = nombreArchivo;
      link.href = canvas.toDataURL("image/png");
      link.click();
    }

async function dibujarPost() {
  const canvas = document.getElementById("canvasPost");
  const ctx = canvas.getContext("2d");
  const img = document.getElementById("imgPost");

  canvas.width = 1080;
  canvas.height = 1080;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // POST: imagen cuadrada, sin recorte extra
  ctx.drawImage(img, 0, 0, 1080, 1080);

  await dibujarContenidoComun(ctx, canvas);
}

async function dibujarStory() {
  const canvas = document.getElementById("canvasStory");
  const ctx = canvas.getContext("2d");
  const img = document.getElementById("imgStory");

  canvas.width = 1080;
  canvas.height = 1920;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // HISTORIA: misma imagen, ampliada y recortada para cubrir 9:16
  const scale = canvas.height / img.height;
  const drawWidth = img.width * scale;
  const drawHeight = canvas.height;

  const offsetX = (canvas.width - drawWidth) / 2;
  const offsetY = 0;

  ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);

  await dibujarContenidoComun(ctx, canvas);
}

async function dibujarContenidoComun(ctx, canvas) {
  const textoUsuario = document.getElementById("texto").value || "";
  const isStory = canvas.height > canvas.width;

  const grad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  grad.addColorStop(0, "rgba(0,120,135,0.8)");
  grad.addColorStop(0.25, "rgba(0,120,135,0)");
  grad.addColorStop(0.75, "rgba(0,120,135,0)");
  grad.addColorStop(1, "rgba(0,120,135,0.9)");
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.shadowColor = "rgba(0,0,0,0.6)";
  ctx.shadowBlur = 12;
  ctx.shadowOffsetY = 4;

  ctx.fillStyle = "white";
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";

  ctx.font = "bold 72px Montserrat, sans-serif";

  const palabras = textoUsuario.split(" ");

  if (palabras.length > 2) {
    const mitad = Math.ceil(palabras.length / 2);
    const linea1 = palabras.slice(0, mitad).join(" ");
    const linea2 = palabras.slice(mitad).join(" ");

    ctx.fillText(linea1, canvas.width * 0.5, isStory ? 180 : 130);
    ctx.fillText(linea2, canvas.width * 0.5, isStory ? 260 : 215);
  } else {
    ctx.fillText(textoUsuario, canvas.width * 0.5, isStory ? 220 : 170);
  }

  const paddingX = canvas.width * 0.06;
  const baseY = isStory ? canvas.height - 150 : canvas.height * 0.92;

  ctx.textAlign = "left";

  ctx.font = "32px Montserrat, sans-serif";
  ctx.fillText("Consultas sin cargo", paddingX, baseY - 50);

  ctx.font = "bold 48px Montserrat, sans-serif";
  ctx.fillText("3412-3456789", paddingX, baseY);

  if (logoURL) {
    const logoImg = new Image();
    logoImg.src = logoURL;

    await new Promise((resolve) => {
      logoImg.onload = () => {
        const h = 90;
        const w = logoImg.width * (h / logoImg.height);

        const logoX = canvas.width - w - paddingX;
        const logoY = baseY - h + 15;

        ctx.drawImage(logoImg, logoX, logoY, w, h);
        resolve();
      };

      logoImg.onerror = () => resolve();
    });
  }

  ctx.shadowColor = "transparent";
}

document.getElementById("texto").addEventListener("input", async () => {
  const imgPost = document.getElementById("imgPost");

  if (imgPost.src) {
    await dibujarPost();
    await dibujarStory();
  }
});
  </script>
</body>
</html>
